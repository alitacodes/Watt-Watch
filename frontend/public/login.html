<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin-bottom: 10px; }
        #message { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Login Test</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="userid">User ID:</label>
            <input type="text" id="userid" name="userid" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    
    <div id="message"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            // Prevent the browser's default form submission
            event.preventDefault();
            
            const userid = document.getElementById('userid').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            messageDiv.textContent = ''; // clear previous messages

            try {
                const response = await fetch('/api/v1/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ userid: userid, password: password })
                });

                // Since your Python code returns a redirect (`redirect(url_for('index'))`) on success
                if (response.redirected) {
                    window.location.href = response.url;
                } else if (response.ok) {
                    window.location.href = '/'; 
                } else {
                    const data = await response.json();
                    messageDiv.textContent = data.error || 'Login failed (Bad Credentials)';
                }
            } catch (error) {
                console.error('Error:', error);
                messageDiv.textContent = 'A network error occurred.';
            }
        });
    </script>
</body>
</html>
